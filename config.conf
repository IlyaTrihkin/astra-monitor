# Конфигурация для astra-monitor
# Скопируйте в config.conf и отредактируйте

# --- Telegram ---
TELEGRAM_ENABLED=yes
TELEGRAM_TOKEN=ваш_токен_бота
TELEGRAM_CHAT_ID=ваш_chat_id

# --- Zabbix ---
ZABBIX_ENABLED=no
ZABBIX_SERVER=127.0.0.1
ZABBIX_HOST=astra-server
ZABBIX_SENDER=/usr/bin/zabbix_sender

# --- Пороги для уведомлений (в процентах) ---
CPU_THRESHOLD=80
RAM_THRESHOLD=85
DISK_THRESHOLD=90

# --- Логирование ---
LOG_FILE=/var/log/astra-monitor.log
